# Run on demand or when the main app repo dispatches an event.
# Copy templates/monorepo-dispatch.yml into your app repo to auto-trigger on push/PR.
name: Engine gate

on:
  workflow_dispatch:
    inputs:
      include_live:
        description: 'Run live smoke (Ring 3)'
        required: false
        default: 'true'
        type: boolean
  repository_dispatch:
    types: [siyf-engine-check]

permissions:
  contents: read

env:
  SIYF_API_URL: ${{ vars.SIYF_API_URL || 'https://siyf-api.nic-58f.workers.dev' }}
  SIYF_SOURCE_REPO: ${{ vars.SIYF_SOURCE_REPO || 'Sports-in-your-face/siyf-engine' }}

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.SIYF_SOURCE_REPO }}
          path: siyf-app
          token: ${{ secrets.SIYF_REPO_TOKEN || github.token }}

      - name: Resolve engine path
        id: paths
        run: |
          if [ -f siyf-app/package.json ] && [ -d siyf-app/engine ]; then
            echo "engine_dir=siyf-app" >> "$GITHUB_OUTPUT"
          else
            echo "engine_dir=siyf-app/siyf-chrome" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ steps.paths.outputs.engine_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.paths.outputs.engine_dir }}
        run: npm ci

      - name: Run engine rings
        env:
          SIYF_APP_ROOT: ${{ github.workspace }}/siyf-app
          SIYF_API_URL: ${{ env.SIYF_API_URL }}
        run: node checks/run-engine.mjs
